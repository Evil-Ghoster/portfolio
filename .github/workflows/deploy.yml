name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  # Permet de déclencher manuellement depuis GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Vérifier la présence du CNAME
      run: |
        if [ ! -f "CNAME" ]; then
          echo "onjanirina.me" > CNAME
          echo "✅ Fichier CNAME créé avec onjanirina.me"
        else
          echo "✅ Fichier CNAME déjà présent"
          cat CNAME
        fi
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Afficher l'URL de déploiement
      run: |
        echo "✅ Déploiement terminé !"
        echo "🌐 Site accessible à : https://onjanirina.me"
        echo "🔗 GitHub Pages : ${{ steps.deployment.outputs.page_url }}"